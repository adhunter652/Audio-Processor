<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search – Audio Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f0f12; --surface: #18181c; --border: #2a2a30; --text: #e4e4e7; --text-muted: #71717a; --accent: #a78bfa; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
    .card { padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 480px; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--text-muted); font-size: 0.95rem; margin: 0 0 1.5rem; }
    a { color: var(--accent); text-decoration: none; display: inline-block; margin-right: 1rem; }
    a:hover { text-decoration: underline; }
    .actions { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
    button { font: inherit; padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .sync-status { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); }
    .sync-status.success { color: #86efac; }
    .sync-status.error { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Search results</h1>
    <p>Search transcript segments and meetings from processed audio in the output bucket.</p>
    <div class="actions">
      <a href="/search/transcripts">Search transcripts</a>
      <a href="/search/meetings">Search meetings</a>
      <button type="button" id="sync-btn" onclick="runSync()">Check outputs & re-index</button>
      <button type="button" id="status-btn" onclick="checkSyncStatus()">Check last result</button>
    </div>
    <div id="sync-status" class="sync-status" aria-live="polite"></div>
  </div>
  <script>
    async function runSync() {
      var btn = document.getElementById('sync-btn');
      var status = document.getElementById('sync-status');
      btn.disabled = true;
      status.textContent = 'Checking outputs and re-indexing…';
      status.className = 'sync-status';
      try {
        var r = await fetch('/api/sync', { method: 'POST' });
        var text = await r.text();
        var data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (_) {
          status.textContent = r.ok ? 'Invalid response from server.' : 'Error: ' + (text.slice(0, 200) || r.statusText);
          status.className = 'sync-status error';
          return;
        }
        if (!r.ok) {
          status.textContent = 'Error: ' + (data && data.detail ? (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail)) : text || r.statusText);
          status.className = 'sync-status error';
          return;
        }
        if (!data || typeof data.ok === 'undefined') {
          status.textContent = 'Unexpected response from server.';
          status.className = 'sync-status error';
          return;
        }
        if (data.started) {
          status.textContent = 'Re-indexing started in background. This may take a few minutes. You can leave this page; run again later to see results.';
          status.className = 'sync-status success';
          return;
        }
        var parts = [];
        if (data.restored) parts.push('RAG restored from bucket');
        parts.push(data.newly_indexed + ' job(s) newly indexed');
        if (data.errors && data.errors.length) parts.push(data.errors.length + ' error(s)');
        status.textContent = parts.join('. ');
        status.className = 'sync-status success';
      } catch (e) {
        status.textContent = 'Request failed: ' + e.message;
        status.className = 'sync-status error';
      } finally {
        btn.disabled = false;
      }
    }
    async function checkSyncStatus() {
      var status = document.getElementById('sync-status');
      status.textContent = 'Checking…';
      status.className = 'sync-status';
      try {
        var r = await fetch('/api/sync/status');
        var text = await r.text();
        var data = null;
        try { data = text ? JSON.parse(text) : null; } catch (_) {}
        if (!data) {
          status.textContent = 'Could not load status.';
          status.className = 'sync-status error';
          return;
        }
        if (data.status === 'never_run') {
          status.textContent = 'No re-index has been run yet. Click "Check outputs & re-index" to start.';
          status.className = 'sync-status';
          return;
        }
        if (data.status === 'complete' && data.result) {
          var res = data.result;
          if (!res.ok) {
            status.textContent = 'Last run failed: ' + (res.error || 'Unknown error');
            status.className = 'sync-status error';
            return;
          }
          var parts = [];
          if (res.restored) parts.push('RAG restored from bucket');
          parts.push(res.newly_indexed + ' job(s) newly indexed');
          if (res.errors && res.errors.length) parts.push(res.errors.length + ' error(s)');
          status.textContent = 'Last run: ' + parts.join('. ');
          status.className = 'sync-status success';
          return;
        }
        status.textContent = 'Re-index is still running. Try again in a moment.';
        status.className = 'sync-status';
      } catch (e) {
        status.textContent = 'Request failed: ' + e.message;
        status.className = 'sync-status error';
      }
    }
  </script>
</body>
</html>
