<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search transcripts – Audio Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f0f12; --surface: #18181c; --border: #2a2a30; --text: #e4e4e7; --text-muted: #71717a; --accent: #a78bfa; --radius-sm: 6px; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    .layout { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    nav { margin-bottom: 1.5rem; display: flex; gap: 1rem; }
    nav a { color: var(--text-muted); text-decoration: none; }
    nav a:hover { color: var(--accent); }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; }
    .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .search-row input[type="search"] { flex: 1; padding: 0.6rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); }
    .search-row button { padding: 0.6rem 1.2rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; }
    .filter-row { margin-bottom: 1rem; }
    .folder-checkboxes label { margin-right: 1rem; cursor: pointer; }
    .results { display: flex; flex-direction: column; gap: 0.75rem; }
    .segment-card { padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .segment-card .file { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    .segment-card .timestamp-link { color: var(--accent); font-family: 'JetBrains Mono', monospace; text-decoration: none; }
    .segment-card .timestamp-link:hover { text-decoration: underline; }
    .empty { color: var(--text-muted); font-style: italic; }
    .player-bar { padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 1rem; }
    audio { width: 100%; }
  </style>
</head>
<body>
  <div class="layout">
    <nav>
      <a href="/">Home</a>
      <a href="/search/transcripts">Search transcripts</a>
      <a href="/search/meetings">Search meetings</a>
    </nav>
    <h1>Search transcripts</h1>
    <p class="subtitle">Search transcription segments. Click a timestamp to play audio.</p>
    <div class="search-row">
      <input type="search" id="query" placeholder="e.g. budget, timeline" />
      <button type="button" id="searchBtn">Search</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Filter by folders:</span>
      <div class="folder-checkboxes" id="folderFilters"></div>
    </div>
    <div class="player-bar" id="playerBar" style="display: none;">
      <div class="label" id="playerLabel">Playing</div>
      <audio id="globalAudio" controls preload="metadata"></audio>
    </div>
    <div class="results" id="results"></div>
  </div>
  <script>
    const API = '';
    const resultsEl = document.getElementById('results');
    const queryEl = document.getElementById('query');
    const searchBtn = document.getElementById('searchBtn');
    const playerBar = document.getElementById('playerBar');
    const playerLabel = document.getElementById('playerLabel');
    const globalAudio = document.getElementById('globalAudio');
    const folderFilters = document.getElementById('folderFilters');
    async function loadFolders() {
      try {
        const r = await fetch(API + '/api/folders');
        const data = await r.json();
        folderFilters.innerHTML = (data.folders || []).map(f => '<label><input type="checkbox" class="folder-filter-cb" value="' + f.id + '" /> ' + escapeHtml(f.name) + '</label>').join('');
      } catch (_) {}
    }
    function getSelectedFolderIds() {
      return Array.from(folderFilters.querySelectorAll('.folder-filter-cb:checked')).map(cb => parseInt(cb.value, 10));
    }
    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }
    function playAt(jobId, startSec, label) {
      globalAudio.src = API + '/api/audio/' + encodeURIComponent(jobId);
      globalAudio.currentTime = startSec;
      globalAudio.play().catch(function(){});
      playerLabel.textContent = label || 'Playing';
      playerBar.style.display = 'block';
    }
    async function doSearch() {
      const q = (queryEl.value || '').trim();
      if (!q) { resultsEl.innerHTML = '<p class="empty">Enter a search query.</p>'; return; }
      resultsEl.innerHTML = '<p class="empty">Searching…</p>';
      const fids = getSelectedFolderIds();
      const fidsParam = fids.length ? '&folder_ids=' + encodeURIComponent(fids.join(',')) : '';
      try {
        const r = await fetch(API + '/api/search/transcripts?q=' + encodeURIComponent(q) + fidsParam);
        const data = await r.json();
        const results = data.results || [];
        if (results.length === 0) { resultsEl.innerHTML = '<p class="empty">No segments found.</p>'; return; }
        resultsEl.innerHTML = results.map(function(seg) {
          const start = seg.start != null ? seg.start : 0;
          const label = escapeHtml(seg.original_filename || seg.job_id);
          return '<div class="segment-card"><div class="file">' + label + '</div><div><a href="#" class="timestamp-link" role="button" data-job-id="' + escapeHtml(seg.job_id) + '" data-start="' + start + '">[' + formatTime(start) + ']</a> <span class="text">' + escapeHtml(seg.text || '') + '</span></div></div>';
        }).join('');
        resultsEl.querySelectorAll('.timestamp-link').forEach(function(link) {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const jobId = link.getAttribute('data-job-id');
            const start = parseFloat(link.getAttribute('data-start'));
            const card = link.closest('.segment-card');
            const label = card ? card.querySelector('.file').textContent : '';
            playAt(jobId, start, label);
          });
        });
      } catch (e) {
        resultsEl.innerHTML = '<p class="empty">Search failed: ' + escapeHtml(e.message) + '</p>';
      }
    }
    loadFolders();
    searchBtn.addEventListener('click', doSearch);
    queryEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
  </script>
</body>
</html>
