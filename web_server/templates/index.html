<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search – Audio Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f0f12; --surface: #18181c; --border: #2a2a30; --text: #e4e4e7; --text-muted: #71717a; --accent: #a78bfa; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
    .card { padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 480px; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: var(--text-muted); font-size: 0.95rem; margin: 0 0 1.5rem; }
    a { color: var(--accent); text-decoration: none; display: inline-block; margin-right: 1rem; }
    a:hover { text-decoration: underline; }
    .actions { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
    button { font: inherit; padding: 0.5rem 1rem; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .sync-status { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); }
    .sync-status.success { color: #86efac; }
    .sync-status.error { color: #fca5a5; }
    .sync-log { margin-top: 0.75rem; padding: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .sync-log .line { margin: 0.2em 0; }
    .sync-log .line.result { color: var(--accent); font-weight: 500; }
    button.syncing { opacity: 0.8; pointer-events: none; }
    button.syncing::after { content: ''; display: inline-block; width: 1em; height: 1em; margin-left: 0.5em; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Search results</h1>
    <p>Search transcript segments and meetings from processed audio in the output bucket.</p>
    <div class="actions">
      <a href="/search/transcripts">Search transcripts</a>
      <a href="/search/meetings">Search meetings</a>
      <button type="button" id="sync-btn" onclick="runSync()">Check outputs & re-index</button>
    </div>
    <div id="sync-status" class="sync-status" aria-live="polite"></div>
    <div id="sync-log" class="sync-log" role="log" aria-live="polite" style="display: none;"></div>
  </div>
  <script>
    async function runSync() {
      var btn = document.getElementById('sync-btn');
      var status = document.getElementById('sync-status');
      var logEl = document.getElementById('sync-log');
      btn.disabled = true;
      btn.classList.add('syncing');
      status.textContent = 'Starting sync…';
      status.className = 'sync-status';
      logEl.style.display = 'block';
      logEl.innerHTML = '';
      function addLog(msg, isResult) {
        var line = document.createElement('div');
        line.className = 'line' + (isResult ? ' result' : '');
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }
      try {
        var r = await fetch('/api/sync', { method: 'POST' });
        if (!r.ok || !r.body) {
          status.textContent = 'Request failed: ' + (r.statusText || r.status);
          status.className = 'sync-status error';
          return;
        }
        var reader = r.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buf += decoder.decode(chunk.value, { stream: true });
          var parts = buf.split('\n\n');
          buf = parts.pop() || '';
          for (var i = 0; i < parts.length; i++) {
            var block = parts[i];
            var dataLine = block.split('\n').find(function(l) { return l.startsWith('data: '); });
            if (!dataLine) continue;
            try {
              var data = JSON.parse(dataLine.slice(6));
              if (data.type === 'progress') {
                addLog(data.message, false);
              } else if (data.type === 'result') {
                if (data.ok) {
                  var parts2 = [];
                  if (data.restored) parts2.push('RAG restored from bucket');
                  parts2.push(data.newly_indexed + ' job(s) newly indexed');
                  if (data.errors && data.errors.length) parts2.push(data.errors.length + ' error(s)');
                  addLog('Done: ' + parts2.join('. '), true);
                  status.textContent = 'Sync complete.';
                  status.className = 'sync-status success';
                } else {
                  addLog('Error: ' + (data.error || 'Unknown error'), true);
                  status.textContent = 'Sync failed.';
                  status.className = 'sync-status error';
                }
              }
            } catch (_) {}
          }
        }
        if (buf) {
          var dataLine = buf.split('\n').find(function(l) { return l.startsWith('data: '); });
          if (dataLine) {
            try {
              var data = JSON.parse(dataLine.slice(6));
              if (data.type === 'progress') addLog(data.message, false);
              else if (data.type === 'result' && data.ok) status.className = 'sync-status success';
              else if (data.type === 'result' && !data.ok) status.className = 'sync-status error';
            } catch (_) {}
          }
        }
      } catch (e) {
        addLog('Request failed: ' + e.message, true);
        status.textContent = 'Request failed.';
        status.className = 'sync-status error';
      } finally {
        btn.disabled = false;
        btn.classList.remove('syncing');
      }
    }
  </script>
</body>
</html>
